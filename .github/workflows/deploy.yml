name: Deploy to Railway

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      service:
        description: 'Railway service name (leave empty to auto-detect)'
        required: false
        default: '''

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          airway whoami
          echo "---DEPLOY_GOING---"
          if [ -n "${{ github.event.inputs.service }}" ]; then
            railway up --service '${{ github.event.inputs.service }}'
          else
            railway up
          fi